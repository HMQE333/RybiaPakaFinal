<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Water line -->
  <path d="M8 38 Q16 34 24 38 Q32 42 40 38 Q48 34 56 38" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Float body lower (below water) -->
  <ellipse cx="32" cy="46" rx="5" ry="10" fill="#e2e8f0"/>
  <!-- Float body upper (above water, red top) -->
  <ellipse cx="32" cy="28" rx="5" ry="12" fill="#f87171"/>
  <!-- Float stripe/divider at waterline -->
  <ellipse cx="32" cy="38" rx="5" ry="2.5" fill="#1e3a5f" opacity="0.3"/>
  <!-- Shine on red part -->
  <ellipse cx="30" cy="22" rx="2" ry="4" fill="#fecaca" opacity="0.6"/>
  <!-- Antenna/stick -->
  <line x1="32" y1="16" x2="32" y2="6" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="1.5" fill="#fbbf24"/>
</svg>
