<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hook body -->
  <path d="M32 8 Q32 8 32 28 Q32 48 20 52 Q12 54 10 46 Q8 38 16 36" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Tip of hook -->
  <path d="M16 36 Q22 32 24 38" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Point -->
  <line x1="24" y1="38" x2="20" y2="35" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Eye of hook -->
  <circle cx="32" cy="10" r="5" fill="none" stroke="#94a3b8" stroke-width="3.5"/>
  <!-- Shine -->
  <path d="M22 28 Q20 38 16 40" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Fishing line through eye -->
  <line x1="32" y1="5" x2="32" y2="2" stroke="#cbd5e1" stroke-width="1.5"/>
</svg>
